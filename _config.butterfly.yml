# Butterfly theme overrides

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user

social:
  fab fa-github: https://github.com/goodnighttt || GitHub || '#24292e'

favicon: /img/favicon.svg

avatar:
  img: /img/avatar.png
  effect: false

disable_top_img: false
default_top_img: /img/hero-multiverse.png
index_img: /img/hero-multiverse.png
archive_img: /img/hero-multiverse.png
tag_img: /img/hero-multiverse.png
category_img: /img/hero-multiverse.png
footer_img: false
background: '#f8f1e5'

subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 文学、艺术和影像

index_layout: 3

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 游戏开发 / AI 应用 / 产品思考
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/goodnighttt
  card_announcement:
    enable: true
    content: 这里记录游戏开发、AI 应用和产品经历中的想法、复盘与观察。

darkmode:
  enable: true
  button: true
  autoChangeMode: false

search:
  use: local_search
  local_search:
    preload: false
    CDN:
    pagination:
      enable: true
      per_page: 10

footer:
  owner:
    enable: true
    since: 2026
  custom_text: Shot on film grain, tuned by glitch.

inject:
  head:
    - <link rel="stylesheet" href="/Goodnight-Lab/css/goodnight-multiverse.css">
