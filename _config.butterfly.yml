# Butterfly theme overrides

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user

social:
  fab fa-github: https://github.com/goodnighttt || GitHub || '#24292e'

favicon: /img/favicon.svg

avatar:
  img: /img/avatar.png
  effect: false

disable_top_img: false
default_top_img: /img/background.jpg
index_img: /img/background.jpg
archive_img: /img/background.jpg
tag_img: /img/background.jpg
category_img: /img/background.jpg
footer_img: false
background: '#f7f9fc'

subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 不要温和地走入那个良夜

index_layout: 3

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 不要温和地走入那个良夜
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/goodnighttt
  card_announcement:
    enable: true
    content: 不要温和地走入那个良夜

darkmode:
  enable: true
  button: true
  autoChangeMode: false

search:
  use: local_search
  local_search:
    preload: false
    CDN:
    pagination:
      enable: true
      per_page: 10

footer:
  owner:
    enable: true
    since: 2026
  custom_text: Powered by Hexo and Butterfly
